name = "solana-quant"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "solana-quant-db"
database_id = "8b24ec51-1edd-4d96-8f27-42cbdf85c84a"

# KV Namespace
[[kv_namespaces]]
binding = "KV"
id = "53e38ad36eb847f2af4e9c36bdea1baf"

# Environment Variables (set via wrangler secret put)
# TELEGRAM_BOT_TOKEN
# TELEGRAM_CHAT_ID
# COINGECKO_API_KEY

# Cron Trigger - runs every 5 minutes
[triggers]
crons = ["*/5 * * * *"]
